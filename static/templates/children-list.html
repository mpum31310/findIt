<div ng-controller="NavController">
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#/">
                <i class="fas fa-qrcode"></i> Scanofinder
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#/profile">Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#/children">Children</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#/items">Items</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#/messages">Messages</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#/" ng-click="logout()">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</div>

<div class="container-main">
    <div class="page-header d-flex justify-content-between align-items-center">
        <h2><i class="fas fa-child"></i> My Children</h2>
        <button class="btn btn-primary" ng-click="addChild()">
            <i class="fas fa-plus"></i> Add Child
        </button>
    </div>
    
    <div class="card" ng-if="loading">
        <div class="card-body text-center p-5">
            <div class="spinner-border text-primary" role="status"></div>
        </div>
    </div>
    
    <div ng-if="!loading && children.length === 0" class="card">
        <div class="card-body text-center p-5">
            <i class="fas fa-child fa-3x mb-3 text-muted"></i>
            <h4>No children added yet</h4>
            <p class="text-muted">Add your first child to start managing their items</p>
            <button class="btn btn-primary" ng-click="addChild()">
                <i class="fas fa-plus"></i> Add Child
            </button>
        </div>
    </div>
    
    <div class="row" ng-if="!loading && children.length > 0">
        <div class="col-md-6 mb-3" ng-repeat="child in children">
            <div class="item-card">
                <h4>{{ child.name }} {{ child.surname }}</h4>
                <p><strong>Grade:</strong> {{ child.grade }}</p>
                <p><strong>School:</strong> {{ child.school }}</p>
                <button class="btn btn-primary btn-sm" ng-click="viewChild(child.id)">
                    <i class="fas fa-eye"></i> View Details
                </button>
            </div>
        </div>
    </div>
</div>
