<div ng-controller="NavController">
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#/">
                <i class="fas fa-qrcode"></i> Scanofinder
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#/profile">Profile</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</div>

<div class="container-main">
    <div class="page-header">
        <h2><i class="fas fa-credit-card"></i> Subscription</h2>
    </div>
    
    <div class="card" ng-if="subscription && subscription.is_active">
        <div class="card-body p-4">
            <div class="alert alert-success">
                <h5><i class="fas fa-check-circle"></i> Active Subscription</h5>
                <p>Your subscription is active until {{ subscription.end_date | date:'medium' }}</p>
                <p><strong>Days remaining:</strong> {{ subscription.days_remaining }}</p>
            </div>
        </div>
    </div>
    
    <div class="card" ng-if="!subscription || !subscription.is_active">
        <div class="card-header">
            <h3 class="mb-0">Subscribe Now</h3>
        </div>
        <div class="card-body p-4">
            <div ng-if="error" class="alert alert-danger">{{ error }}</div>
            <div ng-if="success" class="alert alert-success">{{ success }}</div>
            
            <div class="text-center mb-4">
                <h2>R200/year</h2>
                <p class="text-muted">Unlimited items, children, and QR codes</p>
            </div>
            
            <div id="card-element" class="mb-3">
                <!-- Stripe Elements will create form elements here -->
            </div>
            
            <button class="btn btn-primary w-100" ng-click="subscribe()" ng-disabled="loading">
                <span ng-if="loading" class="spinner-border spinner-border-sm me-2"></span>
                Subscribe Now
            </button>
        </div>
    </div>
</div>
