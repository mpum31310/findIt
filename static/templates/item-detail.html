<div ng-controller="NavController">
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#/">
                <i class="fas fa-qrcode"></i> Scanofinder
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#/items">Back to Items</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</div>

<div class="container-main">
    <div class="page-header">
        <h2><i class="fas fa-box"></i> Item Details</h2>
    </div>
    
    <div class="card" ng-if="loading">
        <div class="card-body text-center p-5">
            <div class="spinner-border text-primary" role="status"></div>
        </div>
    </div>
    
    <div ng-if="!loading && !editing">
        <div class="card mb-3">
            <div class="card-body p-4">
                <div ng-if="error" class="alert alert-danger">{{ error }}</div>
                <div ng-if="success" class="alert alert-success">{{ success }}</div>
                
                <div class="row">
                    <div class="col-md-6">
                        <div ng-if="item.item_image_url" class="mb-3">
                            <img ng-src="{{ item.item_image_url }}" class="img-fluid rounded" alt="{{ item.name }}">
                        </div>
                        <h4>{{ item.name }}</h4>
                        <p ng-if="item.description">{{ item.description }}</p>
                        <p><strong>Assigned to:</strong> 
                            <span ng-if="item.child">{{ item.child.name }} {{ item.child.surname }}</span>
                            <span ng-if="!item.child">Unassigned</span>
                        </p>
                        <p><strong>Created:</strong> {{ item.created_at | date:'medium' }}</p>
                    </div>
                    <div class="col-md-6">
                        <div class="qr-code-display" ng-if="item.qr_code_url">
                            <img ng-src="{{ item.qr_code_url }}" alt="QR Code">
                            <div class="mt-3">
                                <button class="btn btn-primary" ng-click="downloadQR()">
                                    <i class="fas fa-download"></i> Download QR Code
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <button class="btn btn-primary me-2" ng-click="edit()">
                    <i class="fas fa-edit"></i> Edit Item
                </button>
                <button class="btn btn-danger" ng-click="delete()">
                    <i class="fas fa-trash"></i> Delete Item
                </button>
            </div>
        </div>
    </div>
    
    <div class="card" ng-if="!loading && editing">
        <div class="card-body p-4">
            <form ng-submit="save()">
                <div class="mb-3">
                    <label class="form-label">Item Name</label>
                    <input type="text" class="form-control" ng-model="editItem.name" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" rows="3" ng-model="editItem.description"></textarea>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Assign to Child</label>
                    <select class="form-select" ng-model="editItem.child_id">
                        <option value="">None</option>
                        <option ng-repeat="child in children" value="{{ child.id }}">
                            {{ child.name }} {{ child.surname }}
                        </option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Item Image</label>
                    <input type="file" class="form-control" accept="image/*" 
                           onchange="angular.element(this).scope().onFileSelect(this.files)">
                </div>
                
                <button type="submit" class="btn btn-primary me-2" ng-disabled="loading">
                    <span ng-if="loading" class="spinner-border spinner-border-sm me-2"></span>
                    Save Changes
                </button>
                <button type="button" class="btn btn-secondary" ng-click="cancel()">Cancel</button>
            </form>
        </div>
    </div>
</div>
