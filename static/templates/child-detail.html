<div ng-controller="NavController">
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#/">
                <i class="fas fa-qrcode"></i> Scanofinder
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#/children">Back to Children</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</div>

<div class="container-main">
    <div class="page-header">
        <h2><i class="fas fa-child"></i> Child Details</h2>
    </div>
    
    <div class="card" ng-if="loading">
        <div class="card-body text-center p-5">
            <div class="spinner-border text-primary" role="status"></div>
        </div>
    </div>
    
    <div class="card" ng-if="!loading && !editing">
        <div class="card-body p-4">
            <div ng-if="error" class="alert alert-danger">{{ error }}</div>
            <div ng-if="success" class="alert alert-success">{{ success }}</div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <strong>Name:</strong> {{ child.name }}
                </div>
                <div class="col-md-6 mb-3">
                    <strong>Surname:</strong> {{ child.surname }}
                </div>
                <div class="col-md-6 mb-3">
                    <strong>Grade:</strong> {{ child.grade }}
                </div>
                <div class="col-md-6 mb-3">
                    <strong>School:</strong> {{ child.school }}
                </div>
            </div>
            
            <button class="btn btn-primary me-2" ng-click="edit()">
                <i class="fas fa-edit"></i> Edit
            </button>
            <button class="btn btn-danger" ng-click="delete()">
                <i class="fas fa-trash"></i> Delete
            </button>
        </div>
    </div>
    
    <div class="card" ng-if="!loading && editing">
        <div class="card-body p-4">
            <form ng-submit="save()">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" ng-model="editChild.name" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Surname</label>
                        <input type="text" class="form-control" ng-model="editChild.surname" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Grade</label>
                        <input type="text" class="form-control" ng-model="editChild.grade" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">School</label>
                        <input type="text" class="form-control" ng-model="editChild.school" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary me-2" ng-disabled="loading">
                    <span ng-if="loading" class="spinner-border spinner-border-sm me-2"></span>
                    Save Changes
                </button>
                <button type="button" class="btn btn-secondary" ng-click="cancel()">Cancel</button>
            </form>
        </div>
    </div>
</div>
