<div ng-controller="NavController">
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#/">
                <i class="fas fa-qrcode"></i> Scanofinder
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#/profile">Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#/children">Children</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#/items">Items</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#/messages">Messages</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#/" ng-click="logout()">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</div>

<div class="container-main">
    <div class="page-header d-flex justify-content-between align-items-center">
        <h2><i class="fas fa-box"></i> My Items</h2>
        <button class="btn btn-primary" ng-click="addItem()">
            <i class="fas fa-plus"></i> Add Item
        </button>
    </div>
    
    <div class="card" ng-if="loading">
        <div class="card-body text-center p-5">
            <div class="spinner-border text-primary" role="status"></div>
        </div>
    </div>
    
    <div ng-if="!loading && items.length === 0" class="card">
        <div class="card-body text-center p-5">
            <i class="fas fa-box fa-3x mb-3 text-muted"></i>
            <h4>No items added yet</h4>
            <p class="text-muted">Add your first item and generate a QR code</p>
            <button class="btn btn-primary" ng-click="addItem()">
                <i class="fas fa-plus"></i> Add Item
            </button>
        </div>
    </div>
    
    <div class="row" ng-if="!loading && items.length > 0">
        <div class="col-md-6 mb-3" ng-repeat="item in items">
            <div class="item-card">
                <div ng-if="item.item_image_url">
                    <img ng-src="{{ item.item_image_url }}" class="item-image" alt="{{ item.name }}">
                </div>
                <h4>{{ item.name }}</h4>
                <p ng-if="item.description">{{ item.description }}</p>
                <p><strong>Assigned to:</strong> {{ getChildName(item) }}</p>
                <p><strong>Created:</strong> {{ item.created_at | date:'short' }}</p>
                <button class="btn btn-primary btn-sm" ng-click="viewItem(item.id)">
                    <i class="fas fa-eye"></i> View Details
                </button>
            </div>
        </div>
    </div>
</div>
