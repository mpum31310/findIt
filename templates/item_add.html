{% extends 'base.html' %}

{% block title %}Add item — Scanofinder{% endblock %}

{% block content %}
<div class="page-head">
    <h1>Add item</h1>
</div>

<div class="panel" style="max-width: 520px;">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Name</label>
            {{ form.name }}
            <small class="text-muted">Shown on the QR label</small>
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            {{ form.description }}
        </div>
        <div class="mb-3">
            <label class="form-label">Child</label>
            {{ form.child }}
            <small class="text-muted d-block mt-1"><a href="{% url 'child_add' %}">Add a child</a></small>
        </div>
        <div class="mb-3">
            <label class="form-label">Photo (optional)</label>
            {{ form.item_image }}
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn-brand">Create QR label</button>
            <a href="{% url 'items_list' %}" class="btn-outline-brand">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
