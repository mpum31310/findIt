{% extends 'base.html' %}

{% block title %}Sign in — Scanofinder{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-card__header">
            <div class="auth-card__icon"><i class="fas fa-sign-in-alt"></i></div>
            <span class="auth-card__eyebrow">Welcome back</span>
            <h1>Sign in</h1>
            <p class="auth-card__text">Access your family dashboard and keep track of every item.</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn-brand">Sign in</button>
        </form>
        <p class="text-center text-muted small mt-3 mb-0">
            No account? <a href="{% url 'register' %}">Register</a>
        </p>
    </div>
</div>
{% endblock %}
